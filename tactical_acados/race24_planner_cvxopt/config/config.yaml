      # # south pit config
      # pit_2_to_race_s: 3873.0
      # pit_2_to_race_tx: 396.039
      # pit_2_to_race_ty: -833.712
      # pit_2_to_race_dis_th: 15.0
      # pit_2_to_race_max_vel: 15.0

      # race_to_pit_2_s: 2469.0
      # race_to_pit_2_tx: 472.112
      # race_to_pit_2_ty: -60.1908

      # race_to_pit_s_tx: -241.916
      # race_to_pit_s_ty: -347.59

      # race_to_pit_2_dis_th: 15.0
      # race_to_pit_2_max_vel: 5.0

     

    count_lap_config:
      track_length: 3005.9437674

      gp_center_x: -134.140
      gp_center_y: -138.238
      gp_effect_x: -266.061
      gp_effect_y: -153.003

      south_center_x: -78.287
      south_center_y: -638.280
      south_effect_x: -176.328
      south_effect_y: -558.681

      detect_radius: 15.0

    traj_switch_param:
      # how long will take to switch from one trajectory to another
      switch_duration_s: 8.0  # 平滑的时间  实测4.0 ok
      switch_max_speed: 10.0  # 暂时不用
      local_length_m: 200.0

    # follow_control:
    #   keep_distance: 20.0
    #   kp: 1.95            #2.325  1.75
    #   ki: 0.01
    #   max_cumulative_error: 600.0

    follow_control:
      follow_distance_config: 20.0
      kp: 1.0          #2.325  1.75   0.6   1.0
      ki: 0.0 #0.01
      kd: 0.0         #2.5 #0.025   0.0
      max_cumulative_error: 600.0 
      

    overtake_param:
      overtake_max_curv: 0.001
      overtake_decide_distance_m: 100.0
      overtake_fail_x: 10.0
      overtake_success_y: 4.0

    auto_perc:
      init_perc: 100.0

    sampling_planner:
      # 0: OptPlanner (default, no change), 1: SamplingLocalPlanner, 2: OCP (acados), 3: alpha-RACER, 4: IGT-MPC, 5: Hierarchical
      local_planner_method: 0
      # Lateral sample count (reduced for realtime; candidate count = 2*n_lat*v_lon when relative_generation=true)
      n_lat_samples: 9
      # Longitudinal velocity sample count (reduced for realtime)
      v_lon_samples: 20
      # Planning horizon (sec)
      horizon: 3.75
      # Time step between output points (sec): 30 points * 0.125s = 3.75s
      dt: 0.125
      # Number of output trajectory points
      num_output_points: 30
      # Min distance from track boundary (m)
      safety_distance: 0.2
      # Curvature threshold (upstream style fixed check)
      kappa_max: 0.1
      # Vehicle width (m)
      vehicle_width: 2.0
      # Min longitudinal speed for sampling (m/s)
      s_dot_min: 1.0
      # GG diagram absolute margin (m/s^2)
      gg_abs_margin: 0.8
      # Cost weight: velocity tracking
      w_velocity: 100.0
      # Cost weight: raceline deviation
      w_raceline: 5.0
      # Cost weight: opponent avoidance
      w_prediction: 5000.0
      # Prediction cost Gaussian s-direction factor
      pred_s_factor: 0.015
      # Prediction cost Gaussian n-direction factor
      pred_n_factor: 0.5
      # Enable relative (raceline-tendency) trajectory generation
      relative_generation: true
      # Use 3D apparent accelerations like the YAS reference experiment
      friction_check_2d: false
      # ---- Forward-Backward velocity profile ----
      # Enable FB velocity planner (replaces polynomial speed with physics-based profile)
      fb_velocity_enabled: true
      # Drag coefficient: 0.5 * c_w * A_front * rho_air [kg/m]
      fb_drag_coeff: 0.4
      # Vehicle mass [kg]
      fb_m_veh: 692.2
      # Friction circle exponent (1.0=diamond, 2.0=circle)
      fb_dyn_model_exp: 1.1
      # GG scaling factor (0.0-1.0), controls aggressiveness
      fb_gg_scale: 0.8

    optim_planner:
      # OCP horizon in metres (arc-length domain)
      optimization_horizon: 300.0
      # Safety distance from track boundary (m)
      safety_distance: 0.5
      # Vehicle total width (m)
      vehicle_width: 2.0
      # Maximum allowed speed (m/s)
      V_max: 80.0
      # Minimum speed for warm-start (below this, cold start)
      V_min: 5.0
      # Slack weight for track boundary soft constraint
      w_slack_n: 1.0
      # Slack weight for GG diamond soft constraints (high = strictly respect GG limits)
      w_slack_gg: 100.0
      # Number of output trajectory points (must match path_duration/path_discretization)
      num_output_points: 30
      # Output time discretization (s), should match path_discretization_sec
      output_dt: 0.125
      # ---- Obstacle avoidance ----
      # Enable obstacle avoidance (tighten track boundaries around opponents)
      obstacle_avoidance_enabled: true
      # Longitudinal safety zone half-length (m): how far ahead/behind opponent to block
      opp_safety_s: 15.0
      # Lateral safety zone half-width (m): extra clearance beyond opponent vehicle width
      opp_safety_n: 3.0
      # Assumed opponent vehicle width (m)
      opp_vehicle_width: 2.0

    # ---- IGT Game-Theoretic Value Integration (Berkeley IGT) ----
    # When enabled, V_GT from igt_value_node modulates opponent avoidance:
    #   V_GT > 0 (ego advantage) → shrink safety zone → aggressive overtake
    #   V_GT < 0 (opp advantage) → expand safety zone → defensive driving
    igt_game_theory:
      # Master enable/disable switch (can be toggled at runtime via ros2 param set)
      enabled: true
      # Timeout for V_GT freshness (seconds). If no V_GT received within this time, use defaults.
      timeout_sec: 1.0
      # Scale factor when attacking (V_GT > 0): safety zone *= this value at max V_GT
      # Values < 1.0 mean smaller safety zone = more aggressive (e.g. 0.5 = half safety zone)
      attack_safety_scale: 0.5
      # Scale factor when defending (V_GT < 0): safety zone *= this value at max |V_GT|
      # Values > 1.0 mean larger safety zone = more cautious (e.g. 1.5 = 50% larger safety zone)
      defend_safety_scale: 1.5
      # Deadband: |V_GT| below this value → no modulation (use default safety params)
      value_deadband: 0.05

    # ---- Stackelberg Tactical Game Manager (lightweight upper layer for case 12 OCP) ----
    # When enabled, a lightweight Stackelberg game evaluates overtake/defend actions
    # and injects modified safety parameters into the OCP solver.
    # When disabled, case 12 behaviour is IDENTICAL to baseline (A/B guarantee).
    tactical_layer:
      # Master enable/disable switch (can be toggled at runtime via ros2 param set)
      enabled: false
      # --- Front-car engagement zone (for overtake evaluation) ---
      front_s_min: 5.0          # min ds to consider opponent as "front car" (m)
      front_s_max: 80.0         # max ds for front-car engagement (m)
      # --- Rear-car engagement zone (for defend logic) ---
      rear_s_min: 3.0           # min |ds| to consider opponent as "rear car" (m)
      rear_s_max: 40.0          # max |ds| for rear-car engagement (m)
      # --- Safety zone scale factors for each mode ---
      attack_safety_scale: 0.4  # ATTACK mode: shrink safety zone (more aggressive)
      follow_safety_scale: 1.0  # FOLLOW mode: normal safety zone
      recover_safety_scale: 1.3 # RECOVER mode: expand safety zone (cautious)
      # --- Defense corridor bias (m) ---
      defend_corridor_bias: 1.5 # shift corridor center to block opponent
      # --- Pass-side lateral bias magnitude (m) ---
      side_bias_magnitude: 2.0  # lateral bias added for ATTACK_LEFT/ATTACK_RIGHT
      # --- Terminal lateral soft target weight ---
      terminal_n_weight: 0.3    # blend weight for terminal n target (0=none, 1=full)
      # --- Cost thresholds for mode switching ---
      attack_cost_threshold: 0.8   # attack cost must be < follow * this to switch to ATTACK
      recover_cost_threshold: 1.2  # switch to RECOVER if current cost > baseline * this
      # --- Hysteresis: minimum steps to hold current mode before re-evaluation ---
      hysteresis_hold_steps: 8.0
      # --- Opponent block model: assumed n-shift when opponent blocks (m) ---
      opp_block_n_shift: 1.0
      # --- Defend mode: speed margin to reduce relative to opponent (m/s) ---
      defend_speed_margin: 2.0
      # --- Terminal speed penalty weight for cost computation ---
      terminal_V_penalty: 0.1
      # --- Path diff horizon: number of output points for yaw/xy diff metrics ---
      path_diff_horizon: 5.0
