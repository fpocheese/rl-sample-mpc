      # # pit_1_to_race_s: 916.0
      # # pit_1_to_race_tx: 745.802
      # # pit_1_to_race_ty: -561.258
      # pit_1_to_race_dis_th: 15.0
      # pit_1_to_race_max_vel: 90.0

      # race_to_pit_1_s: 4836.0
      # race_to_pit_1_tx: -234.1
      # race_to_pit_1_ty: -325.5
      # # race_to_pit_1_s: 5350.0
      # # race_to_pit_1_tx: 73.393
