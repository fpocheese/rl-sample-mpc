planner_cvxopt:
  ros__parameters:
    env:
      planner_py_enabled: false
      AUTO_OVERTAKING: false
      AUTO_PERC_WITH_LAP: true
      IS_GP0_South1: 0
      Masrshall_get1_not0 : 1
      # ROS2_PLANNER_TRACK_PATH: "/home/uav/Simulator_Cloud/src/planner_cvxopt/config/tracks"

    base_planner:
      timer_step_func_micro: 12500
      path_discretization_sec: 0.125
      path_duration_sec: 3.75
      acceleration_ramp_g: -2.0     # -0.5  -0.0225 
      soft_localization_std_dev_threshold: 0.9 #Covariance threshold where the planner starts to stop the vehicle but is allowed to recover
      hard_localization_std_dev_threshold: 1.5 #Covariance threshold where the planner starts to stop the vehicle but is NOT allowed to recover
      server_ip: 0.0.0.0  
      server_port: 6669

      # if gps loss but SLAM works fine, set upper speed (这个现在不用了，就设置成100不影响速度设置)
      gps_loss_speed: 100.0

    pit_lane_config:

      # gp pit config yasold
