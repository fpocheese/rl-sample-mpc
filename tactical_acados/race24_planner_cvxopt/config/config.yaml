      pit_1_to_race_tx: 39.32
      pit_1_to_race_ty: 422.24
      pit_1_to_race_dis_th: 15.0
      pit_1_to_race_max_vel: 90.0

      race_to_pit_1_s: 2540.44
      race_to_pit_1_tx: -401.84
      race_to_pit_1_ty: -277.304
      race_to_pit_1_dis_th: 15.0
      race_to_pit_1_max_vel: 90.0

      # race_to_pit_1_s: 4622.0
